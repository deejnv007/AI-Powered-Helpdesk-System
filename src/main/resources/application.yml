spring:
  application:
    name: Helpdesk
  # datasource configuration for MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/spring_ai_db
    username: root
    password: Dee@090899
  # jpa configuration for Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
#    properties:
#      hibernate:
#        dialect: org.hibernate.dialect.MySQL8Dialect
  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: meta-llama/llama-3.3-70b-instruct

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

server:
  port: 8090

logging:
  level:
    org.springframework:
      JDBC:
        datasource:
          init: DEBUG
      ai:
        chat:
          client:
            advisor: DEBUG


